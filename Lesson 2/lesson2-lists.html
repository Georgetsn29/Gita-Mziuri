<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>lists</title>

    <style>
       ul, ol li {
            color: red;
        }
    </style>
</head>
<body>

    <h1>Lists</h1>

    <!-- ! unordered list - ul -->
    <ul>
        <li>coffee</li>
        <li>tea</li>
    </ul>

    <ul>
        <li>1</li>
        <li>2</li>
        <li>3</li>
        <li>4</li>
    </ul>

    <!-- ! ordered list - ol -->
    <ol start="100">
        <li>coffee</li>
        <li>tea</li>
    </ol>

    <!-- ! description list - dl -->

    <dl>
        <dt>coffee</dt>
        <dd>black hot drink</dd>

        <dt>tea</dt>
        <dd>hot drink with leaves</dd>
    </dl>
 

</body>
</html>
