<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="stylesheet" href="./styles/style.css">

    <title>Lesson 10.2 homework</title>
</head>
<body>

    <section id="formSection">
        <form action="" class="form">
            <div class="form-text">
                <h2 class="form-text__h2">Event Registration</h2>
                <p class="form-text__p">Register with us to get more details.</p>
            </div>

           <label for="">Name</label>
           <div class="form-name">
                <div class="form-name-flex">
                    <input type="text" name="" id="" class="form-control icon-placeholder" placeholder="&#xF4E1;" required>
                    <label for="">First</label>
                </div>

                <div class="form-name-flex">
                    <input type="text" name="" id="" class="form-control icon-placeholder" required>
                    <label for="">Last</label>
                </div>
           </div>
           

           <label for="">Email</label>
           <input type="email" name="" id="" class="form-control icon-placeholder" placeholder="&#xF32F;" required>
           
           <label for="">Phone</label>
           <input type="tel" name="" id="" class="form-control icon-placeholder" placeholder="&#xF5C1;" maxlength="16" required>

           <label for="">Topic</label>
           <select name="" id="" class="form-control">
            <option value="">Topic 1</option>
           </select>

           <label for="">Prefered Slot</label>
           <select name="" id="" class="form-control">
                <option value="">1</option>
                <option value="">2</option>
           </select>

           <button type="submit" class="form-btn">Sign me up</button>

        </form>
    </section>
            
</body>
</html>
